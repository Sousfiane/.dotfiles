[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

icon-0 = 1;п„ 
icon-1 = 2;пүЁ
icon-2 = 3;пҺ’
icon-3 = 4;пҒј
icon-4 = 5;пҶј
icon-default = пү¬

label-active = %icon%
label-active-background = ${colors.background}
label-active-foreground = ${colors.primary}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %icon%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.primary}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

ramp-volume-0 = %{F#C4A7E7}пҖҰ%{F-}
ramp-volume-1 = %{F#C4A7E7}пҖ§%{F-}
ramp-volume-2 = %{F#C4A7E7}пҖЁ%{F-}

label-muted = %{F#C4A7E7}пҡ©%{F-}

click-right = pavucontrol

[module/eth]
type = internal/network
interface-type = wired
interval = 5

format-connected = <label-connected>
label-connected = %{A1:nm-connection-editor:}%{F#C4A7E7}пӮ¬%{F-}%{A}

format-disconnected = <label-disconnected>
label-disconnected = %{F#707880}пӮ¬%{F-}

click-right = nm-connection-editor

[module/network]
type = internal/network
interface = wlan0
interval = 1.0

accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal>  <label-connected>

format-disconnected = <label-disconnected>
format-disconnected-prefix = "пӘ©  "
format-disconnected-prefix-font = 6
format-disconnected-prefix-foreground = ${color.RED}

label-connected = "Connected"
label-disconnected = "Disconnected"

ramp-signal-0 = у°–©
ramp-signal-1 = у°–©
ramp-signal-2 = у°–©
ramp-signal-3 = у°–©
ramp-signal-4 = у°–©
ramp-signal-font = 6
ramp-signal-foreground = ${color.CYAN}

click-right = nm-connection-editor

[module/date]
type = internal/date
interval = 1

date = %A %d %b

label = %{A1:orage:}%{F#C4A7E7}пҒі%{F-}%{A} %date%
label-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 1

time = %H:%M

format-prefix = "пҖ— "
format-prefix-foreground = ${colors.primary}

label = %time%
label-foreground = ${colors.foreground}

[module/spotify]
type = custom/script
interval = 1
format-prefix = "пҶј "
format-prefix-foreground = #1DB954
format-underline = #1db954
format = <label>
exec = python ~/.config/polybar/scripts/spotify_status.py -f '{artist}:{song}'
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous

[module/updates-arch]
type = custom/script
exec = "arch_updates -s"
tail = true

format = <label>
format-prefix = "пҢў "
format-prefix-foreground = ${colors.primary}

click-right = "arch_updates -u&"
click-left = "arch_updates -q&"
click-middle = "arch_updates -c&"
scroll-up = "arch_updates -n&"

[module/powermenu]
type = custom/text
format = <label>
format-foreground = ${colors.alert}
format-padding = 1

label = "пҖ‘ "

click-left = exec ~/.config/rofi/powermenu/type-1/powermenu.sh

[module/battery]
type = internal/battery
click-left = exec ~/.config/rofi/applets/bin/battery.sh
full-at = 99

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging>  <label-charging>
format-charging-prefix = 

format-discharging = <ramp-capacity>  <label-discharging>

format-full = <label-full>
format-full-prefix = "пүҖ "
format-full-prefix-font = 6
format-full-prefix-foreground = ${colors.primary}

label-charging = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}
label-discharging = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}
label-full = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}

ramp-capacity-0 = пү„
ramp-capacity-1 = пүғ
ramp-capacity-2 = пүӮ
ramp-capacity-3 = пүҒ
ramp-capacity-4 = пүҖ
ramp-capacity-font = 6
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = пү„
animation-charging-1 = пүғ
animation-charging-2 = пүӮ
animation-charging-3 = пүҒ
animation-charging-4 = пүҖ
animation-charging-font = 6
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[settings]
screenchange-reload = true
pseudo-transparency = true
