;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[bar/mybar]
monitor = ${env:MONITOR:}

width = 100%
height = 35px
radius = 12

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3px

border-size = 15px
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Source Code Pro Semibold:style=Regular:size=10;2
font-1 = Font Awesome 6 Brands,Font Awesome 6 Brands Regular:style=Regular:size=10;2
font-2 = Font Awesome 6 Free,Font Awesome 6 Free Solid:style=Solid:size=10;2
font-3 = Noto Sans Mono CJK JP:style=Regular:size=10;1
font-4 = NotoSans NF:style=Regular:size=12;3
font-5 = Iosevka Nerd Font:style=Regular:size=14;3


modules-left = xworkspaces spotify
modules-center = time date
modules-right = pulseaudio updates-arch battery bluetooth wlan powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true