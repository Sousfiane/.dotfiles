[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true

icon-0 = 1;ÔĄ†
icon-1 = 2;ÔČ®
icon-2 = 3;Ôéí
icon-3 = 4;ÔĀľ
icon-4 = 5;ÔÜľ
icon-default = ÔČ¨

label-active = %icon%
label-active-background = ${colors.background}
label-active-foreground = ${colors.iris}
label-active-underline= ${colors.iris}
label-active-padding = 1

label-occupied = %icon%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.iris}
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.love}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.muted}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

ramp-volume-0 = %{F#C4A7E7}ÔÄ¶%{F-}
ramp-volume-1 = %{F#C4A7E7}ÔÄß%{F-}
ramp-volume-2 = %{F#C4A7E7}ÔÄ®%{F-}

label-muted = %{F#C4A7E7}Ôö©%{F-}

click-right = pavucontrol

[network-base]
type = internal/network
interval = 5

[module/eth]
inherit = network-base
interface-type = eno1

format-connected = <label-connected>
label-connected = %{A1:nm-connection-editor:}%{F#f6c177}Ôā¨ %{F-}%{A}

format-disconnected = <label-disconnected>
label-disconnected = %{A1:nm-connection-editor:}%{F#6e6a86}Ôā¨ %{F-}%{A}

click-right = nm-connection-editor

[module/wlan]
inherit = network-base
interface = wlan0

accumulate-stats = true
unknown-as-up = true

format-connected = <ramp-signal>

format-disconnected = <label-disconnected>
format-disconnected-prefix = "Ôáę "
format-disconnected-prefix-foreground = ${colors.muted}
 
label-disconnected = %{A1:nm-connection-editor:}Disconnected%{A}

ramp-signal-0 = %{A1:nm-connection-editor:}Ôáę %{A}
ramp-signal-1 = %{A1:nm-connection-editor:}Ôáę %{A}
ramp-signal-2 = %{A1:nm-connection-editor:}Ôáę %{A}
ramp-signal-3 = %{A1:nm-connection-editor:}Ôáę %{A}
ramp-signal-4 = %{A1:nm-connection-editor:}Ôáę %{A}
ramp-signal-foreground = ${colors.gold}

[module/date]
type = internal/date
interval = 1

date = %A %d %b

label = %{A1:orage:}%{F#C4A7E7}ÔĀ≥%{F-}%{A} %date%
label-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 1

time = %H:%M

format-prefix = "ÔÄó "
format-prefix-foreground = ${colors.iris}

label = %time%
label-foreground = ${colors.foreground}

[module/spotify]
type = custom/script
interval = 1
format-prefix = "ÔÜľ "
format-prefix-foreground = #1DB954
format-underline = #1db954
format = <label>
exec = python ~/.config/polybar/scripts/spotify_status.py -f '{artist}:{song}'
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous

[module/updates-arch]
type = custom/script
exec = "arch_updates -s"
tail = true

format = <label>
format-prefix = "ůį£á "
format-prefix-foreground = ${colors.iris}

click-right = "arch_updates -u&"
click-left = "arch_updates -q&"
click-middle = "arch_updates -c&"
scroll-up = "arch_updates -n&"

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth/bluetooth.sh
interval = 2
click-left = exec blueberry
click-right = exec ~/.config/polybar/scripts/bluetooth/toggle_bluetooth.sh

[module/battery]
type = internal/battery
click-left = exec ~/.config/rofi/applets/bin/battery.sh
full-at = 95

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging>  <label-charging>
format-charging-prefix = 

format-discharging = <ramp-capacity>  <label-discharging>

format-full = <label-full>
format-full-prefix = "ÔČÄ "
format-full-prefix-font = 6
format-full-prefix-foreground = ${colors.iris}

label-charging = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}
label-discharging = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}
label-full = %{A1:exec ~/.config/rofi/applets/bin/battery.sh:}%percentage%%%{A}

ramp-capacity-0 = %{F#EB6F92}ÔČĄ%{F-}%{A}
ramp-capacity-1 = %{F#F6C177}ÔČÉ%{F-}%{A}
ramp-capacity-2 = %{F#F6C177}ÔČā%{F-}%{A}
ramp-capacity-3 = %{F#C4A7E7}ÔČĀ%{F-}%{A}
ramp-capacity-4 = %{F#C4A7E7}ÔČÄ%{F-}%{A}
ramp-capacity-font = 6
ramp-capacity-foreground = ${colors.iris}

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-font = 6
animation-charging-foreground = ${colors.iris}
animation-charging-framerate = 750

[settings]
screenchange-reload = true
pseudo-transparency = true
